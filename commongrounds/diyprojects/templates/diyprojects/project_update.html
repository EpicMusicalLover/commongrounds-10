{% extends 'base.html' %}
{% block content %}
<h2>Update Project: {{ project.title }}</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Changes</button>
</form>

<br>
<a href="{% url 'diyprojects:project_detail' project.pk %}">Return to Project Details</a> | 
<a href="{% url 'diyprojects:project_list' %}">Return to Projects List</a>
{% endblock %}
