{% block content %}
<h1>Merchandise Store</h1>

<h2>Cart</h2>

{% for owner, items in grouped_transactions.items %}
    <h3>Seller: {{ owner }}</h3>

    {% for t in items %}
        <div>
            <p>Product: {{ t.product.name }}</p>
            <p>Amount: {{ t.amount }}</p>
            <p>Status: {{ t.status }}</p>
        </div>
    {% endfor %}

{% empty %}
    <p>No items in cart.</p>
{% endfor %}
{% endblock %}
