{% block content %}
<h1>Merchandise Store</h1>

<h2>Cart</h2>

{% for owner, items in transactions_group.items %}
    <h3>Seller: {{ owner }}</h3>

    {% for t in items %}
        <div>
            <p><strong>Product:</strong> {{ t.product.name }}</p>
            <p><strong>Amount:</strong> {{ t.amount }}</p>
            <p><strong>Status:</strong> {{ t.status }}</p>
        </div>
    {% endfor %}

{% empty %}
    <p>No items in cart.</p>
{% endfor %}
{% endblock %}
