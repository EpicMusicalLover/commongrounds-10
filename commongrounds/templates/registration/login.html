{% extends "base.html" %}

{% block content %}
<h2> Login </h2>
<html>
    <body>
        <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
        </form>
        <a href="{% url 'password_reset' %}">Forgot password?</a>
        <p>
            Don't have an account yet?
            <a href="{% url 'accounts:register' %}">Register here</a>
        </p>
    </body>
</html>
{% endblock %}
